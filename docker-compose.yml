services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-testdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db_api_net

  api:
    build: ./api
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-testdb}
      API_PORT: 3000
    networks:
      - db_api_net
      - api_frontend_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - api
    environment:
      PORT: 8080
      API_BASE_URL: /api
      API_UPSTREAM: http://api:3000
    networks:
      - api_frontend_net
      - frontend_nginx_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_nginx_net

networks:
  db_api_net:
    internal: true
  api_frontend_net:
    internal: true
  frontend_nginx_net:

volumes:
  pgdata: