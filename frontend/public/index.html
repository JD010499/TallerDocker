<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Docker - Usuarios</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 20px; display: flex; gap: 10px; }
        input { padding: 10px; flex: 1; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { background: #f8f9fa; margin-bottom: 8px; padding: 12px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Gestión de Usuarios</h1>
    
    <div class="form-group">
        <input type="text" id="nameInput" placeholder="Ingresa el nombre del usuario">
        <button onclick="createUser()">Crear Usuario</button>
    </div>

    <h2>Lista de Usuarios</h2>
    <ul id="userList"></ul>

    <script src="/config.js"></script>
    <script>
        const API_BASE_URL = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) || '/api';
        const API_URL = `${API_BASE_URL}/users`;

        // Función para listar usuarios (Requisito 3)
        async function fetchUsers() {
            try {
                const response = await fetch(API_URL);
                const users = await response.json();
                const list = document.getElementById('userList');
                list.innerHTML = '';
                users.forEach(user => {
                    const li = document.createElement('li');
                    li.textContent = `ID: ${user.id} - Nombre: ${user.name}`;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Error al obtener usuarios:', error);
            }
        }

        // Función para crear usuarios (Requisito 3)
        async function createUser() {
            const nameInput = document.getElementById('nameInput');
            const name = nameInput.value.trim();
            if (!name) return alert("Por favor, ingresa un nombre válido.");

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                
                if (response.ok) {
                    nameInput.value = '';
                    fetchUsers(); // Actualizar la lista automáticamente
                } else {
                    alert("Ocurrió un error al crear el usuario.");
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Cargar la lista automáticamente al abrir la página
        window.onload = fetchUsers;
    </script>
</body>
</html>
